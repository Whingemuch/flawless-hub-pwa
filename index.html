  <title>Flawless Hub</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #729b9f;
    }
  </style>
</head>
<body>

  <!-- Google Workspace Login Banner -->
  <div id="login-banner" style="position: fixed; bottom: 0; width: 100vw; background: #1e1e24; border-top: 2px solid #4285F4; color: white; text-align: center; padding: 20px 10px; z-index: 9999; font-family: sans-serif; box-sizing: border-box; box-shadow: 0px -5px 15px rgba(0,0,0,0.5);">
    <p style="margin-top: 0; margin-bottom: 15px; font-size: 14px;">Grey screen? Authorize your Flawless Cabinets account to view the dashboard.</p>
    
    <a href="https://script.google.com/a/macros/flawlesscabinets.com.au/s/AKfycbwa854HE0Rwp1pNPVkDqpzwvr9fBKTVSaMPb2xQWG2d4OT1gVprPxT03FEBDKmh-67p/exec" target="_blank" style="background: #4285F4; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-right: 10px; display: inline-block;">1. Log In</a>
    
    <button onclick="location.reload()" style="background: #34A853; color: white; border: none; padding: 11px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-right: 10px;">2. Reload App</button>
    
    <button onclick="document.getElementById('login-banner').style.display='none'" style="background: transparent; color: #aaa; border: 1px solid #aaa; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Dismiss</button>
  </div>

  <!-- Main App Frame -->
  <iframe
    id="flawlessHubFrame"
    title="Flawless Hub"
    src="https://script.google.com/a/macros/flawlesscabinets.com.au/s/AKfycbwa854HE0Rwp1pNPVkDqpzwvr9fBKTVSaMPb2xQWG2d4OT1gVprPxT03FEBDKmh-67p/exec"
    style="width: 100vw; height: 100vh; border: none; overflow: hidden;"
    allow="geolocation; clipboard-read; clipboard-write"
    scrolling="yes">
  </iframe>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(function () {});
    }
  </script>
</body>
</html>
